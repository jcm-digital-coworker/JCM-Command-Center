name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build
        run: GITHUB_PAGES=true npm run build

      - name: Browser demo smoke
        timeout-minutes: 2
        run: npm run test:demo-browser

      - name: Upload demo build
        uses: actions/upload-artifact@v4
        with:
          name: jcm-command-center-demo
          path: dist

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Record latest action run
        if: always() && github.event_name != 'pull_request'
        run: |
          mkdir -p docs
          cat > docs/LATEST_ACTION_RUN.md <<EOF
          # Latest Action Run

          Run ID: ${GITHUB_RUN_ID}
          Run Attempt: ${GITHUB_RUN_ATTEMPT}
          Run URL: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Commit: ${GITHUB_SHA}
          Branch: ${GITHUB_REF_NAME}
          Workflow: ${GITHUB_WORKFLOW}
          Updated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/LATEST_ACTION_RUN.md
          git commit -m "Record latest action run [skip ci]" || echo "No run record changes"
          git push

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
